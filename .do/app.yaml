# DigitalOcean App Platform spec.
# Deploy: doctl apps create --spec .do/app.yaml
#   (or: DO dashboard → Create App → connect this GitHub repo, then edit.)
# Backend + frontend run as ONE app: /api → backend service, everything else →
# the static SPA. Same origin, so no CORS/proxy needed between them.
name: mindset
region: nyc

services:
  - name: backend
    github:
      repo: HafizAbeer/mind-set-1
      branch: plan-stats-paywall-settings
      deploy_on_push: true
    source_dir: backend
    environment_slug: node-js
    run_command: npm start
    http_port: 8080            # App Platform sets PORT=8080; server reads process.env.PORT
    instance_size_slug: basic-xxs   # ~$5/mo — App Platform services are not free
    instance_count: 1
    routes:
      - path: /api
        preserve_path_prefix: true   # backend mounts /api/*, so keep the prefix
    health_check:
      http_path: /
    envs:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: JWT_SECRET
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: EMAIL_USER
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: EMAIL_PASS
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      # Stripe — only when the paywall ships
      - key: STRIPE_SECRET_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: STRIPE_WEBHOOK_SECRET
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: STRIPE_PRICE_PRO_MONTHLY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: STRIPE_PRICE_PRO_QUARTERLY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: STRIPE_PRICE_PRO_YEARLY
        scope: RUN_AND_BUILD_TIME
        type: SECRET

static_sites:
  - name: frontend
    github:
      repo: HafizAbeer/mind-set-1
      branch: plan-stats-paywall-settings
      deploy_on_push: true
    source_dir: /
    build_command: npm run build
    output_dir: dist
    catchall_document: index.html   # SPA fallback
    routes:
      - path: /
