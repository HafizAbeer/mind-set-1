# Render Blueprint. In Render: New + → Blueprint → pick this repo/branch.
# Secrets (sync: false) are NOT in the repo — set their values in the Render
# dashboard after the services are created.
services:
  # ---- Backend: Express + MongoDB (long-running web service) ----
  - type: web
    name: mindset-backend
    runtime: node
    plan: free            # free spins down after ~15 min idle; upgrade to keep it warm
    rootDir: backend       # install + run from backend/
    buildCommand: npm install
    startCommand: npm start # = node server.js (now listens via require.main check)
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: FRONTEND_URL   # your frontend origin, for CORS
        sync: false
      # --- Stripe: only needed once the paywall ships ---
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_PRO_MONTHLY
        sync: false
      - key: STRIPE_PRICE_PRO_QUARTERLY
        sync: false
      - key: STRIPE_PRICE_PRO_YEARLY
        sync: false

  # ---- Frontend: Vite SPA (static site) ----
  # OPTIONAL — delete this block if you keep the frontend on Vercel.
  # If you keep it here, replace the destination host below with this backend's
  # real URL once it's created (Render may add a suffix if the name is taken).
  - type: web
    name: mindset-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://mindset-backend.onrender.com/api/*
      - type: rewrite
        source: /*
        destination: /index.html
